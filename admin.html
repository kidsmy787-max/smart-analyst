<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Analyst — Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
  :root{--bg:#0f1420;--bg2:#151c2c;--surface:#1c2740;--line:rgba(255,255,255,.09);--ink:#f4f7ff;--muted:#9aa8c4;--blue:#2f7bff;--blue2:#4f9bff;--accent:#16d6a4;--danger:#ff5470;--shadow:0 20px 55px rgba(0,0,0,.45)}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
  body{background:var(--bg);color:var(--ink);min-height:100vh}
  a{color:var(--blue2);text-decoration:none}
  .topbar{background:rgba(15,20,32,.9);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .topbar .in{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .brand{font-weight:800;font-size:19px;display:flex;align-items:center;gap:8px}
  .brand i{color:var(--accent)} .brand span{color:var(--blue2)}
  .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .btn-p{background:var(--blue);color:#fff} .btn-p:hover{background:var(--blue2)}
  .btn-g{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn-d{background:transparent;color:var(--danger);border:1px solid rgba(255,84,112,.4)}
  .btn-d:hover{background:rgba(255,84,112,.12)}
  .wrap{max-width:1100px;margin:0 auto;padding:26px 20px}
  /* login */
  .login{max-width:380px;margin:9vh auto;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:var(--shadow)}
  .login h1{font-size:22px;margin-bottom:6px} .login p{color:var(--muted);font-size:14px;margin-bottom:22px}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px}
  .hidden{display:none!important}
  /* layout */
  .grid2{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
  .panel h2{font-size:17px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .panel h2 i{color:var(--blue2)}
  .drop{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted);cursor:pointer;transition:.2s}
  .drop:hover{border-color:var(--blue);color:var(--ink)}
  .drop i{font-size:30px;color:var(--blue2);display:block;margin-bottom:8px}
  .preview{margin-top:12px;border-radius:10px;overflow:hidden;display:none}
  .preview img{width:100%;display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* product list */
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .pcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .pcard .ph{aspect-ratio:4/3;background:#0b0f18;display:grid;place-items:center;overflow:hidden}
  .pcard .ph img{width:100%;height:100%;object-fit:cover}
  .pcard .ph i{font-size:44px;color:var(--blue2)}
  .pcard .bd{padding:12px 13px}
  .pcard .bd b{font-size:14px} .pcard .bd .c{color:var(--muted);font-size:12px;text-transform:capitalize}
  .pcard .bd .pr{font-weight:800;margin-top:6px}
  .pcard .ac{display:flex;gap:6px;padding:0 13px 13px}
  .pcard .ac button{flex:1;font-size:12px;padding:7px}
  .count{color:var(--muted);font-size:14px;margin-bottom:14px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#04241b;font-weight:700;padding:12px 22px;border-radius:30px;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:50}
  .toast.show{opacity:1;bottom:34px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login">
    <h1><i class="fa-solid fa-lock" style="color:var(--accent)"></i> Admin login</h1>
    <p>Smart Analyst product manager</p>
    <label>Username</label>
    <input id="u" type="text" autocomplete="username" placeholder="admin">
    <label>Password</label>
    <input id="p" type="password" autocomplete="current-password" placeholder="••••••••">
    <div class="err" id="loginErr"></div>
    <button class="btn btn-p" id="loginBtn" style="width:100%;justify-content:center;margin-top:16px"><i class="fa-solid fa-right-to-bracket"></i> Log in</button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hidden">
  <div class="topbar"><div class="in">
    <span class="brand"><i class="fa-solid fa-microchip"></i> Smart <span>Analyst</span> · Admin</span>
    <div style="display:flex;gap:10px">
      <a class="btn btn-g" href="/" target="_blank"><i class="fa-solid fa-store"></i> View shop</a>
      <button class="btn btn-g" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Log out</button>
    </div>
  </div></div>

  <div class="wrap grid2">
    <!-- FORM -->
    <div class="panel">
      <h2><i class="fa-solid fa-plus"></i> <span id="formTitle">Add product</span></h2>
      <input type="hidden" id="editId">
      <div class="drop" id="drop">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span id="dropTxt">Click or drop a product photo</span>
        <input id="file" type="file" accept="image/*" class="hidden">
      </div>
      <div class="preview" id="preview"><img id="previewImg" alt=""></div>

      <label>Product name *</label>
      <input id="name" placeholder="e.g. Samsung Galaxy A55">

      <div class="row2">
        <div><label>Price (TZS) *</label><input id="price" type="number" placeholder="820000"></div>
        <div><label>Old price</label><input id="oldPrice" type="number" placeholder="890000"></div>
      </div>

      <label>Category *</label>
      <select id="category">
        <option value="new">New phones</option>
        <option value="used">Used phones</option>
        <option value="computers">Computers & laptops</option>
        <option value="accessories">Accessories</option>
      </select>

      <label>Short description</label>
      <textarea id="description" rows="2" placeholder="6.6&quot; · 128GB · 8GB RAM"></textarea>

      <div class="err" id="formErr"></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-p" id="saveBtn" style="flex:1;justify-content:center"><i class="fa-solid fa-floppy-disk"></i> Save</button>
        <button class="btn btn-g hidden" id="cancelBtn">Cancel</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="panel">
      <h2><i class="fa-solid fa-box-open"></i> Products</h2>
      <div class="count" id="count">0 products</div>
      <div class="plist" id="plist"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICON={new:"fa-mobile-screen",used:"fa-mobile-screen-button",computers:"fa-laptop",accessories:"fa-headphones"};
const fmt=n=>"TZS "+Number(n).toLocaleString("en-US");
let editId=null, fileObj=null;

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

// ---- auth ----
async function checkAuth(){
  const r=await fetch("/api/me"); const j=await r.json();
  if(j.admin){show("appView");loadProducts();} else show("loginView");
}
function show(id){["loginView","appView"].forEach(v=>document.getElementById(v).classList.toggle("hidden",v!==id));}

document.getElementById("loginBtn").onclick=async()=>{
  const username=document.getElementById("u").value, password=document.getElementById("p").value;
  const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
  if(r.ok){show("appView");loadProducts();}
  else document.getElementById("loginErr").textContent="Invalid username or password";
};
document.getElementById("p").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("loginBtn").click();});
document.getElementById("logoutBtn").onclick=async()=>{await fetch("/api/logout",{method:"POST"});show("loginView");};

// ---- file picker ----
const fileInput=document.getElementById("file"),drop=document.getElementById("drop");
drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.style.borderColor="var(--blue)";};
drop.ondragleave=()=>drop.style.borderColor="";
drop.ondrop=e=>{e.preventDefault();drop.style.borderColor="";if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0]);};
fileInput.onchange=()=>{if(fileInput.files[0])setFile(fileInput.files[0]);};
function setFile(f){fileObj=f;const url=URL.createObjectURL(f);document.getElementById("previewImg").src=url;document.getElementById("preview").style.display="block";document.getElementById("dropTxt").textContent=f.name;}

// ---- save ----
document.getElementById("saveBtn").onclick=async()=>{
  const name=document.getElementById("name").value.trim();
  const price=document.getElementById("price").value;
  const category=document.getElementById("category").value;
  const err=document.getElementById("formErr");err.textContent="";
  if(!name||!price){err.textContent="Name and price are required.";return;}
  const fd=new FormData();
  fd.append("name",name);fd.append("price",price);
  fd.append("oldPrice",document.getElementById("oldPrice").value);
  fd.append("category",category);
  fd.append("description",document.getElementById("description").value);
  if(fileObj)fd.append("image",fileObj);
  const url=editId?`/api/products/${editId}`:"/api/products";
  const method=editId?"PUT":"POST";
  const r=await fetch(url,{method,body:fd});
  if(r.ok){toast(editId?"Product updated":"Product added");resetForm();loadProducts();}
  else{const j=await r.json().catch(()=>({}));err.textContent=j.error||"Save failed";}
};
document.getElementById("cancelBtn").onclick=resetForm;
function resetForm(){
  editId=null;fileObj=null;
  ["name","price","oldPrice","description"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("category").value="new";
  document.getElementById("preview").style.display="none";
  document.getElementById("dropTxt").textContent="Click or drop a product photo";
  document.getElementById("formTitle").textContent="Add product";
  document.getElementById("cancelBtn").classList.add("hidden");
  fileInput.value="";
}

// ---- list ----
async function loadProducts(){
  const r=await fetch("/api/products");const list=await r.json();
  document.getElementById("count").textContent=list.length+" product"+(list.length!==1?"s":"");
  const box=document.getElementById("plist");
  if(!list.length){box.innerHTML='<p style="color:var(--muted)">No products yet. Add your first one on the left.</p>';return;}
  box.innerHTML=list.map(p=>`
    <div class="pcard">
      <div class="ph">${p.image?`<img src="${p.image}" alt="${p.name}">`:`<i class="fa-solid ${ICON[p.category]||'fa-box'}"></i>`}</div>
      <div class="bd"><b>${p.name}</b><div class="c">${labelCat(p.category)}</div><div class="pr">${fmt(p.price)}</div></div>
      <div class="ac">
        <button class="btn btn-g" data-edit="${p.id}"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-d" data-del="${p.id}"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`).join("");
  box.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>startEdit(list.find(p=>p.id===b.dataset.edit)));
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>del(b.dataset.del));
}
function labelCat(c){return{new:"New phone",used:"Used phone",computers:"Computer",accessories:"Accessory"}[c]||c;}
function startEdit(p){
  editId=p.id;fileObj=null;
  document.getElementById("name").value=p.name;
  document.getElementById("price").value=p.price;
  document.getElementById("oldPrice").value=p.oldPrice||"";
  document.getElementById("category").value=p.category;
  document.getElementById("description").value=p.description||"";
  document.getElementById("formTitle").textContent="Edit product";
  document.getElementById("cancelBtn").classList.remove("hidden");
  if(p.image){document.getElementById("previewImg").src=p.image;document.getElementById("preview").style.display="block";document.getElementById("dropTxt").textContent="Change photo (optional)";}
  else{document.getElementById("preview").style.display="none";document.getElementById("dropTxt").textContent="Click or drop a product photo";}
  window.scrollTo({top:0,behavior:"smooth"});
}
async function del(id){
  if(!confirm("Delete this product?"))return;
  const r=await fetch(`/api/products/${id}`,{method:"DELETE"});
  if(r.ok){toast("Product deleted");loadProducts();}
}

checkAuth();
</script>
</body>
</html>
